  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --white: #fafaf8;
      --red: #D32F2F;
      --blue: #1565C0;
      --yellow: #F9A825;
      --green: #2E7D32;
      --border: 3px solid #0a0a0a;
      --border-thick: 5px solid #0a0a0a;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', Helvetica, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Mondrian structural frame ── */
    .m-left  { position: fixed; left: 0; top: 0; bottom: 0; width: 12px; background: var(--black); z-index: 200; }
    .m-top   { position: fixed; left: 0; right: 0; top: 0; height: 12px; background: var(--black); z-index: 200; }
    .m-corner-1 { position: absolute; top: 12px; left: 12px; width: 92px; height: 92px; background: var(--red); z-index: 190; border-right: var(--border); border-bottom: var(--border); }
    .m-corner-2 { position: absolute; top: 12px; right: 0; width: 140px; height: 64px; background: var(--blue); z-index: 190; border-left: var(--border); border-bottom: var(--border); }
    .m-corner-3 { width: 180px; height: 80px; background: var(--yellow); z-index: 190; border-left: var(--border); border-top: var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s; }
    .m-corner-3:hover { opacity: 0.6; }
    .m-corner-3.hidden { opacity: 0; pointer-events: none; }
    .m-corner-black { width: 64px; height: 48px; background: var(--black); z-index: 190; flex-shrink: 0; }
    .footer-bottom-corners { display: flex; align-items: flex-end; justify-content: space-between; margin-left: -12px; }

    .m-corner-1, .m-corner-2, .m-corner-3 {
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.3s;
    }
    .m-corner-1:hover, .m-corner-2:hover, .m-corner-3:hover { opacity: 0.6; }
    .m-corner-1.hidden, .m-corner-2.hidden, .m-corner-3.hidden { opacity: 0; pointer-events: none; }
    .m-corner-label {
      font-family: var(--font-body);
      font-size: 9px; letter-spacing: 0.4em;
      text-transform: uppercase; color: #ccc;
      font-weight: 300; opacity: 0;
      transition: opacity 0.2s; pointer-events: none;
      user-select: none;
    }
    .m-corner-1:hover .m-corner-label,
    .m-corner-2:hover .m-corner-label,
    .m-corner-3:hover .m-corner-label { opacity: 1; }
    .page { display: none; flex-direction: column; min-height: 100vh; padding: 12px 0 0 12px; position: relative; }
    .page.active { display: flex; min-height: 100vh; }

    /* ── Header ── */
    .site-header {
      position: relative; z-index: 10;
      display: grid;
      grid-template-columns: 0px 1fr 154px;
      align-items: stretch;
      border-bottom: var(--border-thick);
      background: var(--white);
    }

    .header-left-cell {
      display: flex;
      flex-direction: column;
    }

    .header-center-cell {
      border-left: var(--border);
      border-right: var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      text-decoration: none; cursor: pointer;
      padding: 0 22px 14px 22px;
      height: 110px;
      flex-shrink: 0;
      width: 100%;
    }
    .logo-word {
      font-family: var(--font-display);
      font-size: clamp(48px, 6.5vw, 80px);
      font-weight: 400; letter-spacing: -0.03em;
      color: var(--black); line-height: 1; text-transform: lowercase;
    }
    .logo-word em { font-style: italic; color: var(--red); }

    .header-tagline-cell {
      border-top: var(--border);
      padding: 18px 22px 22px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
    }
    .header-tagline {
      font-family: var(--font-display);
      font-size: clamp(17px, 2.2vw, 26px);
      font-weight: 300; letter-spacing: -0.02em;
      color: #bbb; line-height: 1.3;
      text-transform: lowercase; font-style: italic;
      text-align: center;
    }

    .header-nav-cell {
      width: 154px;
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 0 0 22px 0;
      align-items: center; gap: 10px;
    }
    .nav-link {
      font-size: 8px; letter-spacing: 0.3em;
      text-transform: uppercase; color: #999;
      font-weight: 300; text-decoration: none; cursor: pointer;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--black); }

    /* ── Panels ── */
    .panels {
      flex: 1; display: grid;
      grid-template-columns: 1fr 5px 1fr;
      grid-template-rows: auto auto;
      align-items: stretch;
      transition: grid-template-columns 0.6s cubic-bezier(0.77,0,0.18,1);
      min-height: 540px; position: relative; z-index: 10;
    }
    .panel-3-row {
      grid-column: 1 / -1;
      border-top: var(--border-thick);
      cursor: pointer;
      transition: background 0.3s;
    }
    .panel-3-row:hover { background: rgba(249,168,37,0.04); }
    .panels.expanded-3 .panel-3-row { cursor: default; }
    .panels.expanded-3 .panel-3-row:hover { background: transparent; }
    .panel-3-row .panel-3 { padding-top: 10px; }
    .panel-divider { background: var(--black); width: 5px; transition: opacity 0.4s ease; }
    .panel {
      padding: 52px 56px 52px 52px;
      display: flex; flex-direction: column;
      cursor: pointer;
      transition: background 0.3s, opacity 0.4s;
      overflow: hidden; position: relative;
    }
    .panel:hover { background: rgba(249,168,37,0.04); }
    .panel-3:hover { background: transparent; }
    .panel-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 10px;
      transition: height 0.3s;
    }
    .panel-bar.blue { background: var(--blue); }
    .panel-bar.red  { background: var(--red); }
    .panel:hover .panel-bar { height: 14px; }
    .panel-3-row:hover .panel-3 .panel-bar { height: 14px; }
    .panels.expanded-3 .panel-3-row:hover .panel-3 .panel-bar { height: 10px; }

    .panel-number {
      font-size: 8px; letter-spacing: 0.3em; color: #ccc;
      font-weight: 300; margin-bottom: 40px; margin-top: 22px;
    }
    .collapsed .panel-number { display: none; }
    .panel-title {
      font-family: var(--font-display);
      font-size: clamp(38px, 5.5vw, 60px);
      font-weight: 400; letter-spacing: -0.04em;
      color: var(--black); line-height: 1;
      text-transform: lowercase; margin-bottom: 10px;
    }
    .panel-sub {
      font-size: 9px; letter-spacing: 0.3em;
      text-transform: uppercase; color: #aaa;
      font-weight: 300; margin-bottom: 36px;
    }
    .panel-body {
      font-size: 14px; line-height: 1.75;
      color: #888; font-weight: 300; font-style: italic; max-width: 300px;
    }
    .panel-body strong { font-style: normal; font-weight: 400; color: var(--black); }
    .spacer { flex: 1; }
    .panel-cta {
      font-size: 9px; letter-spacing: 0.4em;
      text-transform: uppercase; color: #ccc; font-weight: 300;
      transition: color 0.25s, letter-spacing 0.3s; margin-top: 40px;
    }
    .panel:hover .panel-cta { color: var(--black); letter-spacing: 0.52em; }
    .panel-3-row:hover .panel-cta { color: var(--black); letter-spacing: 0.52em; }
    .panels.expanded-3 .panel-3-row:hover .panel-cta { color: #ccc; letter-spacing: 0.4em; }

    /* Expanded */
    .panels.expanded-1 { grid-template-columns: 1fr 5px 0fr 5px 0fr; }
    .panels.expanded-2 { grid-template-columns: 0fr 5px 1fr 5px 0fr; }
    .panels.expanded-3 { grid-template-columns: 1fr; grid-template-rows: 0 auto; }
    .panels.expanded-1 .panel-2,
    .panels.expanded-1 .panel-3,
    .panels.expanded-2 .panel-1,
    .panels.expanded-2 .panel-3 { opacity: 0; pointer-events: none; padding: 0; overflow: hidden; }
    .panels.expanded-3 .panel-1,
    .panels.expanded-3 .panel-2 { display: none; }
    .panels.expanded-1 .panel-divider,
    .panels.expanded-2 .panel-divider { opacity: 0; }
    .panels.expanded-3 .panel-divider { display: none; }
    .panels.expanded-1 .panel-1,
    .panels.expanded-2 .panel-2,
    .panels.expanded-3 .panel-3 { cursor: default; }
    .panels.expanded-1 .panel-1:hover,
    .panels.expanded-2 .panel-2:hover,
    .panels.expanded-3 .panel-3:hover { background: transparent; }
    .panels.expanded-1 .panel-1 .collapsed,
    .panels.expanded-2 .panel-2 .collapsed,
    .panels.expanded-3 .panel-3 .collapsed { display: none; }
    .expanded-inner { display: none; flex-direction: column; flex: 1; }
    .panels.expanded-1 .panel-1 .expanded-inner,
    .panels.expanded-2 .panel-2 .expanded-inner,
    .panels.expanded-3 .panel-3 .expanded-inner { display: flex; }

    .exp-grid {
      display: flex; flex-direction: column;
      gap: 28px; flex: 1; margin-top: 22px;
      max-width: 680px;
    }
    .exp-title {
      font-family: var(--font-display);
      font-size: clamp(44px, 6.5vw, 72px);
      font-weight: 400; letter-spacing: -0.04em;
      color: var(--black); line-height: 0.95;
      text-transform: lowercase; margin-bottom: 12px;
    }
    .exp-sub {
      font-size: 9px; letter-spacing: 0.3em;
      text-transform: uppercase; color: #aaa; font-weight: 300;
    }
    .exp-right {
      padding-top: 0; opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }
    .panels.expanded-1 .panel-1 .exp-right,
    .panels.expanded-2 .panel-2 .exp-right,
    .panels.expanded-3 .panel-3 .exp-right { opacity: 1; }
    .exp-intro {
      font-size: 14px; line-height: 1.75;
      color: #888; font-weight: 300; font-style: italic; margin-bottom: 20px;
    }
    .exp-intro strong { font-style: normal; font-weight: 400; color: var(--black); }
    .exp-body { font-size: 13px; line-height: 1.95; color: #666; font-weight: 300; }

    /* ─────────────────────────────────────────────────────────────
       v1.51 — aufklappbare Produkte in Panel 1
    ───────────────────────────────────────────────────────────── */
    .p1-product-trigger {
      display: flex; align-items: baseline; justify-content: space-between;
      cursor: pointer; padding-bottom: 20px;
      border-bottom: 2px solid var(--black);
      transition: opacity 0.2s;
      user-select: none;
    }
    .p1-product-trigger:hover { opacity: 0.6; }
    .p1-product-trigger-left { display: flex; flex-direction: column; gap: 5px; }
    .p1-product-trigger-arrow {
      font-family: var(--font-body); font-size: 13px;
      color: #aaa; font-weight: 300;
      transition: transform 0.35s cubic-bezier(0.77,0,0.18,1), color 0.2s;
      flex-shrink: 0;
    }
    .p1-product.open .p1-product-trigger-arrow {
      transform: rotate(45deg); color: var(--black);
    }
    .p1-product-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.55s cubic-bezier(0.77,0,0.18,1);
    }
    .p1-product.open .p1-product-body { max-height: 1400px; }
    .p1-product-body-inner { padding-top: 32px; }

    /* ─────────────────────────────────────────────────────────────
       v1.47 — Panel 1 product sections, redesigned to match P3
    ───────────────────────────────────────────────────────────── */

    .p1-product {
      border-top: var(--border);
      padding-top: 36px;
      margin-top: 56px;
      max-width: 860px;
    }

    .p1-product-header {
      margin-bottom: 48px;
    }
    .p1-product-title {
      font-family: var(--font-display);
      font-size: clamp(26px, 3.2vw, 36px);
      font-weight: 400; letter-spacing: -0.03em;
      color: var(--black); line-height: 1;
      text-transform: lowercase; margin-bottom: 6px;
    }
    .p1-product-sub {
      font-size: 9px; letter-spacing: 0.3em;
      text-transform: uppercase; color: #aaa; font-weight: 300;
    }
    .p1-product-lead {
      font-size: 15px; line-height: 1.85;
      color: #555; font-weight: 300;
      max-width: 680px; margin-top: 20px; margin-bottom: 0;
    }

    .p1-features { margin-bottom: 48px; }
    .p1-feature {
      padding-left: 24px;
      margin-bottom: 24px;
    }
    .p1-feature:last-child { margin-bottom: 0; }
    .p1-feature-label {
      font-size: 11px; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--black);
      font-weight: 400; margin-bottom: 8px;
    }
    .p1-feature-text {
      font-size: 13px; line-height: 1.85; color: #777; font-weight: 300; margin: 0;
    }

    .p1-product.service .p1-feature { border-left: 2px solid var(--blue); }
    .p1-product.sales .p1-feature { border-left: 2px solid var(--red); }

    .p1-steps-label {
      font-size: 8px; letter-spacing: 0.3em;
      text-transform: uppercase; color: #aaa; font-weight: 300; margin-bottom: 12px;
    }
    .p1-steps { border-top: var(--border); }
    .p1-step {
      display: grid; grid-template-columns: 56px 1fr;
      border-bottom: 2px solid var(--black); transition: background 0.2s;
    }
    .p1-step:hover { background: rgba(21,101,192,0.04); }
    .p1-step-num {
      color: var(--white);
      font-family: var(--font-display); font-size: 24px;
      font-weight: 400; display: flex; align-items: center;
      justify-content: center; letter-spacing: -0.02em; min-height: 72px;
    }
    .p1-product.service .p1-step-num { background: var(--blue); }
    .p1-product.sales   .p1-step-num { background: var(--red); }

    .p1-step-body { padding: 16px 20px; display: flex; flex-direction: column; justify-content: center; }
    .p1-step-title { font-size: 12px; font-weight: 700; color: var(--black); letter-spacing: 0.01em; margin-bottom: 4px; }
    .p1-step-desc { font-size: 12px; line-height: 1.6; color: #666; font-weight: 300; }

    /* Back button */
    .btn-back {
      font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
      color: #bbb; font-weight: 300; cursor: pointer; margin-top: 52px;
      display: none; transition: color 0.2s; align-self: flex-start;
      background: none; border: none; padding: 0; font-family: inherit;
    }
    .btn-back:hover { color: var(--black); }
    .panels.expanded-1 .panel-3-row,
    .panels.expanded-2 .panel-3-row { display: none; }
    .panels.expanded-3 .panel-3-row { border-top: var(--border-thick); }
    .panels.expanded-1 .panel-1 .btn-back,
    .panels.expanded-2 .panel-2 .btn-back,
    .panels.expanded-3 .panel-3 .btn-back { display: block; }

    /* ── Hamburger menu ── */
    .hamburger {
      position: fixed; top: 20px; left: 20px;
      background: transparent; z-index: 300;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      gap: 5px; cursor: pointer; border: none;
      padding: 6px; font-family: var(--font-body);
      transition: opacity 0.2s;
    }
    .hamburger:hover { opacity: 0.5; }
    .hamburger span {
      display: block; height: 1.5px;
      background: var(--black);
      transition: transform 0.3s, opacity 0.3s, width 0.3s;
    }
    .hamburger span:nth-child(1) { width: 28px; }
    .hamburger span:nth-child(2) { width: 18px; }
    .hamburger span:nth-child(3) { width: 24px; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); width: 24px; }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); width: 24px; }

    .nav-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--white); z-index: 250;
      display: flex; flex-direction: column;
      justify-content: center; padding: 0 64px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .nav-overlay.open { opacity: 1; pointer-events: auto; }
    .nav-overlay-item {
      font-family: var(--font-display);
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 400; letter-spacing: -0.03em;
      color: var(--black); text-transform: lowercase;
      line-height: 1; cursor: pointer;
      border-bottom: 2px solid #e0e0e0;
      padding: 28px 0;
      transition: color 0.2s;
      display: flex; align-items: center; gap: 24px;
    }
    .nav-overlay-item:first-child { border-top: 2px solid #e0e0e0; }
    .nav-overlay-item:hover { color: #aaa; }
    .nav-overlay-num {
      font-family: var(--font-body);
      font-size: 10px; letter-spacing: 0.3em;
      color: #ccc; font-weight: 300;
      text-transform: uppercase; min-width: 28px;
    }

    .site-footer {
      position: relative; z-index: 10; border-top: var(--border-thick);
      padding: 8px 56px 8px 52px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--white); margin-bottom: 0;
    }
    .footer-left { font-size: 9px; letter-spacing: 0.28em; color: #bbb; font-weight: 300; text-transform: lowercase; }
    .footer-right { font-size: 9px; letter-spacing: 0.2em; color: #bbb; font-weight: 300; cursor: pointer; transition: color 0.2s; }
    .footer-right:hover { color: var(--black); }

    /* CONTACT PAGE */
    .contact-main {
      flex: 1; display: grid; grid-template-columns: 340px 5px 1fr;
      position: relative; z-index: 10; min-height: 560px;
    }
    .contact-left {
      padding: 52px 48px 52px 48px;
      display: flex; flex-direction: column;
      background: var(--white); position: relative;
    }
    .contact-color-block { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: var(--red); }
    .contact-divider { background: var(--black); width: 5px; }
    .contact-right { padding: 52px 56px 52px 52px; display: flex; flex-direction: column; }
    .contact-eyebrow {
      font-size: 8px; letter-spacing: 0.32em;
      text-transform: uppercase; color: #aaa; font-weight: 300;
      margin-bottom: 20px; margin-top: 28px;
      display: flex; align-items: center; gap: 12px;
    }
    .contact-eyebrow::before {
      content: ''; display: block; width: 28px; height: 5px;
      background: var(--red); flex-shrink: 0;
    }
    .contact-title {
      font-family: var(--font-display);
      font-size: clamp(42px, 6vw, 68px);
      font-weight: 400; letter-spacing: -0.04em;
      color: var(--black); line-height: 0.95;

  function h(id, html) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = html;
  }
  function t(id, text) {
    var el = document.getElementById(id);
    if (el) el.textContent = text;
  }

  function renderFeatures(containerId, features) {
    var el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = features.map(function(f) {
      return '<div class="p1-feature"><div class="p1-feature-label">' + f.label + '</div><p class="p1-feature-text">' + f.text + '</p></div>';
    }).join('');
  }

  function renderSteps(containerId, steps) {
    var el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = steps.map(function(s, i) {
      return '<div class="p1-step"><div class="p1-step-num">' + (i + 1) + '</div><div class="p1-step-body"><div class="p1-step-title">' + s.title + '</div><div class="p1-step-desc">' + s.text + '</div></div></div>';
    }).join('');
  }

  function renderP3Content() {
    var c = CONTENT.panel3;
    var el = document.getElementById('p3-content');
    if (!el) return;
    var html = '<p style="font-size:15px;line-height:1.85;color:#555;font-weight:300;max-width:680px;margin-bottom:64px;">' + c.intro + '</p>';
    c.sections.forEach(function(s) {
      var accentVar = s.accent === 'blue' ? 'var(--blue)' : s.accent === 'red' ? 'var(--red)' : 'var(--yellow)';
      html += '<div style="margin-bottom:56px;border-top:var(--border);padding-top:32px;">';
      html += '<div style="font-family:var(--font-display);font-size:clamp(22px,2.8vw,30px);letter-spacing:-0.03em;color:var(--black);margin-bottom:14px;">' + s.title + '</div>';
      html += '<p style="font-size:14px;line-height:1.9;color:#666;font-weight:300;margin-bottom:32px;max-width:640px;">' + s.lead + '</p>';
      s.features.forEach(function(f, fi) {
        var mb = fi < s.features.length - 1 ? 'margin-bottom:24px;' : '';
        html += '<div style="padding-left:24px;border-left:2px solid ' + accentVar + ';' + mb + '">';
        html += '<div style="font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--black);font-weight:400;margin-bottom:8px;">' + f.label + '</div>';
        html += '<p style="font-size:13px;line-height:1.85;color:#777;font-weight:300;margin:0;">' + f.text + '</p>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '<p style="font-size:14px;line-height:1.9;color:#999;font-weight:300;font-style:italic;max-width:640px;border-top:var(--border);padding-top:32px;margin-bottom:0;">' + c.closing + '</p>';
    el.innerHTML = html;
  }

      var tmp = colours[i]; colours[i] = colours[j]; colours[j] = tmp;
    }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });

    window.scrollTo(0,0);

  function goHome() {
    current = 0;

    showPage('page-home');
  }
  function goContact() { showPage('page-contact'); }
  function goImpressum() { showPage('page-impressum'); }

  function expand(n) {
    if (current === n) return;
    current = n;
    document.getElementById('panels').className = 'panels expanded-' + n;
  }
  function collapse(e) {
    e.stopPropagation();
    current = 0;
    document.getElementById('panels').className = 'panels';
  }

  function setSubject(btn, val) {
    document.getElementById('subject').value = val;
    document.querySelectorAll('.subject-hint').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  }

  /* ── v1.53: Web3Forms async submit ── */
  async function submitForm() {
    var form    = document.getElementById('contact-form');
    var btn     = document.getElementById('btn-submit');
    var success = document.getElementById('form-success');
    var errorEl = document.getElementById('form-error');
    var c       = CONTENT.contact.form;

    /* basic HTML5 validation */
    var required = form.querySelectorAll('[required]');
    var valid = true;
    required.forEach(function(el) { if (!el.value.trim()) valid = false; });
    if (!valid) {
      form.reportValidity();
      return;
    }

    /* combine first + last name into a single "name" field for Web3Forms */
    var firstName = document.getElementById('first-name').value.trim();
    var lastName  = document.getElementById('last-name').value.trim();

    /* build JSON payload */
    var payload = {
      access_key: CONTENT.contact.web3formsKey,
      from_name:  'Pumpolino Website',
      name:       (firstName + ' ' + lastName).trim(),
      email:      document.getElementById('email').value.trim(),
      phone:      document.getElementById('phone').value.trim(),
      subject:    document.getElementById('subject').value.trim(),
      message:    document.getElementById('message').value.trim(),
      botcheck:   form.querySelector('[name="botcheck"]').checked,
    };

    /* loading state */
    btn.disabled = true;
    btn.textContent = c.submitBtnSending;
    errorEl.style.display = 'none';

    try {
      var response = await fetch('https://api.web3forms.com/submit', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body:    JSON.stringify(payload),
      });
      var data = await response.json();

      if (data.success) {
        form.style.display = 'none';
        success.style.display = 'block';
      } else {
        throw new Error(data.message || 'Unknown error');
      }
    } catch (err) {
      errorEl.style.display = 'block';
      btn.disabled = false;
      h('btn-submit', c.submitBtn);
    }
  }

  document.querySelectorAll('.panel').forEach(function(p) {
    p.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); p.click(); }
    });
  });
