<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="google-site-verification" content="MdmdQ-X2cMjee2IlvMVtjdzibeW9ljBhXA4Iq9hw-4k"/>
  <title id="seo-title"></title>
  <meta name="description" id="seo-desc" content=""/>
  <meta property="og:title" id="seo-og-title" content=""/>
  <meta property="og:description" id="seo-og-desc" content=""/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://pumpolino.com/process/"/>
  <link rel="canonical" href="https://pumpolino.com/process/"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .page { display: flex; flex-direction: column; min-height: 100vh; padding: 12px 0 0 12px; }
    .page-main { flex: 1; padding: 52px 56px 72px 52px; position: relative; z-index: 10; }
    .page-bar { height: 10px; background: var(--blue); margin: 0 -56px 0 -52px; position: relative; left: -52px; width: calc(100% + 108px); margin-bottom: 40px; }
    .page-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; max-width: 1100px; margin-bottom: 56px; }
    @media (max-width: 760px) {
      .page-main { padding: 36px 28px 56px 28px; }
      .page-grid { grid-template-columns: 1fr; gap: 28px; }
      .p1-product { max-width: 100%; }
    }
  </style>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "Pumpolino",
  "url": "https://pumpolino.com",
  "description": "Pumpolino applies precision to complex problems, from industrial process consulting and AI-driven operations to art provenance and collection management.",
  "slogan": "for a world full of flow",
  "serviceType": ["Process Intelligence Consulting", "Art Provenance Consulting", "Industrial Asset Management"]
}
</script>
</head>
<body>

<div class="m-left"></div>
<div class="m-top"></div>


<div class="nav-overlay" id="nav-overlay">
  <a class="nav-overlay-item" href="/">Home</a>
  <a class="nav-overlay-item" href="/process">Process &amp; Intelligence</a>
  <a class="nav-overlay-item" href="/art">Art &amp; Provenance</a>
  <a class="nav-overlay-item" href="/pumps-and-art">Industrial Pumps &amp; Art</a>
  <a class="nav-overlay-item" href="/contact">Contact</a>
</div>

<div class="page">

  <div class="header-top-corners">
    <div class="m-corner-1" onclick="this.classList.add('hidden')">
    <button class="hamburger" id="hamburger" onclick="event.stopPropagation();toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
    <div class="m-corner-spacer"></div>
    <div class="m-corner-2" onclick="this.classList.add('hidden')"></div>
  </div>
  <header class="site-header">
    <div class="header-left-cell"></div>
    <div class="header-center-cell">
      <a class="logo" href="/">
        <div class="logo-word">pump<em>o</em>lino</div>
      </a>
      <div class="header-tagline-cell">
        <div class="header-tagline">for a world full of flow</div>
      </div>
    </div>
    <div class="header-nav-cell">
      <a class="nav-link" href="/">← Home</a>
      <a class="nav-link" href="/contact">Contact</a>
    </div>
  </header>

  <div style="height:10px;background:var(--blue);margin-left:12px;"></div>
  <main class="page-main">
    <div style="max-width:860px;">
      <div class="exp-title" id="p-title"></div>
      <div class="exp-sub" id="p-sub"></div>
      <div class="exp-intro" id="p-intro"></div>
      <div class="exp-body" id="p-body"></div>
    </div>

    <!-- ServiceFlow -->
    <div class="p1-product service" id="product-service">
      <div class="p1-product-trigger" onclick="toggleProduct('product-service')">
        <div class="p1-product-trigger-left">
          <div class="p1-product-title" id="sf-title"></div>
          <div class="p1-product-sub" id="sf-sub"></div>
        </div>
        <div class="p1-product-trigger-arrow">+</div>
      </div>
      <div class="p1-product-body">
        <div class="p1-product-body-inner">
          <p class="p1-product-lead" id="sf-lead"></p>
          <div class="p1-features" id="sf-features"></div>
          <div class="p1-steps-label" id="sf-steps-label"></div>
          <div class="p1-steps" id="sf-steps"></div>
        </div>
      </div>
    </div>

    <!-- FlowSales -->
    <div class="p1-product sales" id="product-sales">
      <div class="p1-product-trigger" onclick="toggleProduct('product-sales')">
        <div class="p1-product-trigger-left">
          <div class="p1-product-title" id="fls-title"></div>
          <div class="p1-product-sub" id="fls-sub"></div>
        </div>
        <div class="p1-product-trigger-arrow">+</div>
      </div>
      <div class="p1-product-body">
        <div class="p1-product-body-inner">
          <p class="p1-product-lead" id="fls-lead"></p>
          <div class="p1-features" id="fls-features"></div>
          <div class="p1-steps-label" id="fls-steps-label"></div>
          <div class="p1-steps" id="fls-steps"></div>
        </div>
      </div>
    </div>

  </main>

  <footer class="site-footer">
    <a class="footer-right" href="/">← Home</a>
    <span style="display:flex;gap:24px;">
      <a class="footer-right" href="/contact">Contact</a>
      <a class="footer-right" href="/legal">Legal Notice</a>
    </span>
  </footer>

</div>

<script src="/assets/content.js"></script>
<script src="/assets/shared.js"></script>
<script>
  initShared();

  var p = CONTENT.process;

  document.getElementById('p-title').innerHTML = p.title;
  document.getElementById('p-sub').textContent  = p.sub;
  document.getElementById('p-intro').innerHTML  = p.intro;
  document.getElementById('p-body').innerHTML   = p.body;

  var sf = p.serviceflow;
  document.getElementById('sf-title').textContent = sf.title;
  document.getElementById('sf-sub').textContent   = sf.sub;
  document.getElementById('sf-lead').textContent  = sf.lead;
  document.getElementById('sf-steps-label').textContent = sf.stepsLabel;

  document.getElementById('sf-features').innerHTML = sf.features.map(function(f){
    return '<div class="p1-feature"><div class="p1-feature-label">'+f.label+'</div><p class="p1-feature-text">'+f.text+'</p></div>';
  }).join('');
  document.getElementById('sf-steps').innerHTML = sf.steps.map(function(s,i){
    return '<div class="p1-step"><div class="p1-step-num">'+(i+1)+'</div><div class="p1-step-body"><div class="p1-step-title">'+s.title+'</div><div class="p1-step-desc">'+s.text+'</div></div></div>';
  }).join('');

  var fls = p.flowsales;
  document.getElementById('fls-title').textContent = fls.title;
  document.getElementById('fls-sub').textContent   = fls.sub;
  document.getElementById('fls-lead').textContent  = fls.lead;
  document.getElementById('fls-steps-label').textContent = fls.stepsLabel;

  document.getElementById('fls-features').innerHTML = fls.features.map(function(f){
    return '<div class="p1-feature"><div class="p1-feature-label">'+f.label+'</div><p class="p1-feature-text">'+f.text+'</p></div>';
  }).join('');
  document.getElementById('fls-steps').innerHTML = fls.steps.map(function(s,i){
    return '<div class="p1-step"><div class="p1-step-num">'+(i+1)+'</div><div class="p1-step-body"><div class="p1-step-title">'+s.title+'</div><div class="p1-step-desc">'+s.text+'</div></div></div>';
  }).join('');

  function toggleProduct(id) {
    document.getElementById(id).classList.toggle('open');
  }
</script>
<script>
  (function() {
    var s = CONTENT.seo.process;
    document.getElementById('seo-title').textContent = s.title;
    document.getElementById('seo-desc').setAttribute('content', s.description);
    document.getElementById('seo-og-title').setAttribute('content', s.title);
    document.getElementById('seo-og-desc').setAttribute('content', s.description);
  })();
</script>
</body>
</html>
