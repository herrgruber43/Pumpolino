<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="google-site-verification" content="MdmdQ-X2cMjee2IlvMVtjdzibeW9ljBhXA4Iq9hw-4k"/>
  <title id="seo-title"></title>
  <meta name="description" id="seo-desc" content=""/>
  <meta property="og:title" id="seo-og-title" content=""/>
  <meta property="og:description" id="seo-og-desc" content=""/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://pumpolino.com/legal/"/>
  <link rel="canonical" href="https://pumpolino.com/legal/"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .page { display: flex; flex-direction: column; min-height: 100vh; padding: 12px 0 0 12px; }
    .inner-eyebrow.blue::before { background: var(--blue); }
    .inner-right-legal { padding: 52px 56px 52px 52px; display: flex; flex-direction: column; gap: 48px; max-width: 680px; }
  </style>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "Pumpolino",
  "url": "https://pumpolino.com",
  "description": "Pumpolino applies precision to complex problems, from industrial process consulting and AI-driven operations to art provenance and collection management.",
  "slogan": "for a world full of flow",
  "serviceType": ["Process Intelligence Consulting", "Art Provenance Consulting", "Industrial Asset Management"]
}
</script>
</head>
<body>

<div class="m-left"></div>
<div class="m-top"></div>
<div class="m-corner-1" onclick="this.classList.add('hidden')"></div>
<div class="m-corner-2" onclick="this.classList.add('hidden')"></div>


<button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
  <span></span><span></span><span></span>
</button>

<div class="nav-overlay" id="nav-overlay">
  <a class="nav-overlay-item" href="/">Home</a>
  <a class="nav-overlay-item" href="/process">Process &amp; Intelligence</a>
  <a class="nav-overlay-item" href="/art">Art &amp; Provenance</a>
  <a class="nav-overlay-item" href="/pumps-and-art">Industrial Pumps &amp; Art</a>
  <a class="nav-overlay-item" href="/contact">Contact</a>
</div>

<div class="page">
  <header class="site-header">
    <div class="header-left-cell"></div>
    <div class="header-center-cell">
      <a class="logo" href="/">
        <div class="logo-word">pump<em>o</em>lino</div>
      </a>
      <div class="header-tagline-cell">
        <div class="header-tagline">for a world full of flow</div>
      </div>
    </div>
    <div class="header-nav-cell">
      <a class="nav-link" href="/">← Home</a>
    </div>
  </header>

  <div class="inner-main">
    <div class="inner-left">
      <div class="inner-color-block" style="background:var(--blue);"></div>
      <div class="inner-eyebrow blue" id="l-eyebrow"></div>
      <div class="inner-title" id="l-title"></div>
      <p class="inner-note" id="l-note"></p>
    </div>
    <div class="inner-divider"></div>
    <div class="inner-right-legal" id="l-sections"></div>
  </div>

  <footer class="site-footer">
    <a class="footer-right" href="/">← Home</a>
  </footer>

</div>

<script src="/assets/content.js"></script>
<script src="/assets/shared.js"></script>
<script>
  initShared();

  var l = CONTENT.legal;
  document.getElementById('l-eyebrow').textContent = l.eyebrow;
  document.getElementById('l-title').innerHTML     = l.title;
  document.getElementById('l-note').textContent    = l.note;

  document.getElementById('l-sections').innerHTML = l.sections.map(function(s){
    return '<div class="imp-section"><div class="imp-section-title">'+s.title+'</div>'+s.html+'</div>';
  }).join('');
</script>
<script>
  (function() {
    var s = CONTENT.seo.legal;
    document.getElementById('seo-title').textContent = s.title;
    document.getElementById('seo-desc').setAttribute('content', s.description);
    document.getElementById('seo-og-title').setAttribute('content', s.title);
    document.getElementById('seo-og-desc').setAttribute('content', s.description);
  })();
</script>
</body>
</html>
