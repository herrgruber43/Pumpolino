<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Art & Provenance — Pumpolino</title>
  <meta name="description" content="Museums, Collections, Exhibition. We work where meaning asks for discretion."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .page { display: flex; flex-direction: column; min-height: 100vh; padding: 12px 0 0 12px; }
    .page-main { flex: 1; padding: 52px 56px 72px 52px; position: relative; z-index: 10; }
    @media (max-width: 760px) { .page-main { padding: 36px 28px 56px 28px; } }
  </style>
</head>
<body>

<div class="m-left"></div>
<div class="m-top"></div>
<div class="m-corner-1" onclick="this.classList.add('hidden')"></div>
<div class="m-corner-2" onclick="this.classList.add('hidden')"></div>

<button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
  <span></span><span></span><span></span>
</button>

<div class="nav-overlay" id="nav-overlay">
  <a class="nav-overlay-item" href="/">Home</a>
  <a class="nav-overlay-item" href="/process">Process &amp; Intelligence</a>
  <a class="nav-overlay-item" href="/art">Art &amp; Provenance</a>
  <a class="nav-overlay-item" href="/pumps-and-art">Industrial Pumps &amp; Art</a>
  <a class="nav-overlay-item" href="/contact">Contact</a>
</div>

<div class="page">

  <header class="site-header">
    <div class="header-left-cell"></div>
    <div class="header-center-cell">
      <a class="logo" href="/">
        <div class="logo-word">pump<em>o</em>lino</div>
      </a>
      <div class="header-tagline-cell">
        <div class="header-tagline">Precision, applied.</div>
      </div>
    </div>
    <div class="header-nav-cell">
      <a class="nav-link" href="/">← Home</a>
      <a class="nav-link" href="/contact">Contact</a>
    </div>
  </header>

  <div style="height:10px;background:var(--red);margin-left:12px;"></div>
  <main class="page-main">
    <div style="max-width:860px;">
      <div class="exp-title" id="a-title"></div>
      <div class="exp-sub" id="a-sub"></div>
      <div class="exp-intro" id="a-intro"></div>
      <div class="exp-body" id="a-body"></div>
    </div>
  </main>

  <footer class="site-footer">
    <a class="footer-right" href="/">← Home</a>
    <span style="display:flex;gap:24px;">
      <a class="footer-right" href="/contact">Contact</a>
      <a class="footer-right" href="/legal">Legal Notice</a>
    </span>
  </footer>

</div>

<script src="/assets/content.js"></script>
<script src="/assets/shared.js"></script>
<script>
  initShared();
  var a = CONTENT.art;
  document.getElementById('a-title').innerHTML  = a.title;
  document.getElementById('a-sub').textContent  = a.sub;
  document.getElementById('a-intro').innerHTML  = a.intro;
  document.getElementById('a-body').innerHTML   = a.body;
</script>
</body>
</html>
